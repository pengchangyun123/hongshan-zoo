<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>红山动物园 · 手绘导航</title>
<style>
:root{--paper:#faf6ee;--paper-dark:#f0ead6;--ink:#3d322b;--ink-light:#6b5e53;--ink-faint:#a89880;--accent:#4a8c3f;--accent-light:#6ab85a;--blue:#4a7c96;--shadow-rough:3px 3px 0px rgba(61,50,43,.15);--shadow-rough-sm:2px 2px 0px rgba(61,50,43,.12);--font-sketch:'STKaiti','KaiTi','楷体',serif;--font-body:'PingFang SC','Microsoft YaHei',sans-serif;--radius-rough-sm:8px 5px 10px 4px;--radius-rough-lg:18px 12px 20px 10px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:var(--font-body);color:var(--ink);background:var(--paper)}
#map{width:100%;height:100%}
.coord-display{position:fixed;left:12px;bottom:30px;z-index:2000;background:var(--paper);border:2px solid var(--ink);border-radius:var(--radius-rough-sm);padding:4px 10px;font-family:monospace;font-size:12px;color:var(--ink-light);box-shadow:var(--shadow-rough-sm);pointer-events:none}
.top-bar{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:2000;background:var(--paper);border:2.5px solid var(--ink);border-radius:var(--radius-rough-lg);box-shadow:var(--shadow-rough);padding:8px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center}
.brand{display:flex;align-items:center;gap:8px;font-family:var(--font-sketch)}
.brand-icon{font-size:24px}
.brand h1{font-size:18px;font-weight:400;color:var(--ink);font-family:var(--font-sketch)}
.brand-tag{font-size:12px;color:var(--accent);background:rgba(74,140,63,.1);padding:2px 10px;border-radius:20px;border:1.5px dashed var(--accent-light);font-family:var(--font-sketch)}
.header-actions{display:flex;gap:6px}
.btn-sketch{background:var(--paper);border:2px solid var(--ink);border-radius:var(--radius-rough-sm);padding:6px 14px;font-family:var(--font-sketch);font-size:14px;color:var(--ink);cursor:pointer;box-shadow:var(--shadow-rough-sm);transition:transform .1s;display:flex;align-items:center;gap:4px;white-space:nowrap}
.btn-sketch:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0px rgba(61,50,43,.2)}
.btn-sketch .icon{font-size:16px}
.btn-sketch.btn-sm{padding:4px 10px;font-size:12px}
.btn-sketch.btn-go{background:var(--accent);color:white;border-color:var(--accent)}
.side-panel{position:fixed;left:12px;top:50%;transform:translateY(-50%);z-index:2000;background:var(--paper);border:2.5px solid var(--ink);border-radius:var(--radius-rough-lg);box-shadow:var(--shadow-rough);width:300px;max-height:65vh;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
.side-panel.collapsed{transform:translateY(-50%) translateX(-330px)}
.panel-header{padding:12px 14px;border-bottom:2px dashed var(--ink-faint);flex-shrink:0}
.panel-header h3{font-family:var(--font-sketch);font-size:16px;font-weight:400;margin-bottom:10px}
.search-box{position:relative;margin-bottom:8px}
.search-box input{width:100%;padding:8px 32px 8px 12px;border:2px solid var(--ink-faint);border-radius:var(--radius-rough-sm);background:var(--paper-dark);font-family:var(--font-body);font-size:13px;color:var(--ink);outline:none}
.search-box input:focus{border-color:var(--ink)}
.search-icon{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.category-filters{display:flex;flex-wrap:wrap;gap:4px}
.cat-chip{padding:3px 10px;border:1.5px solid var(--ink-faint);border-radius:20px;background:transparent;font-family:var(--font-sketch);font-size:12px;color:var(--ink-light);cursor:pointer}
.cat-chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.location-list{overflow-y:auto;flex:1;padding:6px 8px}
.location-list::-webkit-scrollbar{width:6px}
.location-list::-webkit-scrollbar-thumb{background:var(--ink-faint);border-radius:3px}
.location-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--radius-rough-sm);cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.location-item:hover{background:var(--paper-dark);border-color:var(--ink-faint)}
.location-item.active{background:rgba(74,140,63,.1);border-color:var(--accent)}
.location-item .loc-icon{font-size:22px;flex-shrink:0;width:32px;text-align:center}
.location-item .loc-info{flex:1;min-width:0}
.location-item .loc-name{font-family:var(--font-sketch);font-size:14px;color:var(--ink)}
.location-item .loc-cat{font-size:11px;color:var(--ink-faint)}
.location-item .loc-nav-btn{flex-shrink:0;padding:4px 8px;border:1.5px solid var(--accent);border-radius:var(--radius-rough-sm);background:transparent;color:var(--accent);cursor:pointer;font-family:var(--font-sketch);font-size:11px;opacity:0;transition:opacity .15s}
.location-item:hover .loc-nav-btn{opacity:1}
.nav-info-bar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:2000;background:var(--paper);border:2.5px solid var(--accent);border-radius:var(--radius-rough-lg);box-shadow:var(--shadow-rough);padding:10px 20px;display:none;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center}
.nav-route-info{display:flex;align-items:center;gap:10px;font-family:var(--font-sketch);font-size:14px;flex-wrap:wrap;justify-content:center}
.nav-from,.nav-to{color:var(--ink)}.nav-arrow{color:var(--accent);font-size:18px}
.nav-distance,.nav-time{background:rgba(74,140,63,.1);padding:3px 10px;border-radius:20px;font-size:12px;color:var(--accent)}
.agent-panel{position:fixed;right:16px;bottom:16px;z-index:2000;width:340px;background:var(--paper);border:2.5px solid var(--ink);border-radius:var(--radius-rough-lg);box-shadow:var(--shadow-rough);display:flex;flex-direction:column;max-height:480px}
.agent-panel.collapsed .agent-body{display:none}.agent-panel.collapsed{max-height:none}
.agent-header{display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;user-select:none;flex-shrink:0}
.agent-avatar{font-size:24px}.agent-title{flex:1;font-family:var(--font-sketch);font-size:15px;color:var(--ink)}
.agent-toggle-icon{font-size:18px;color:var(--ink-faint)}
.agent-body{display:flex;flex-direction:column;flex:1;min-height:0;border-top:2px dashed var(--ink-faint)}
.chat-messages{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:10px;max-height:240px}
.chat-messages::-webkit-scrollbar{width:5px}.chat-messages::-webkit-scrollbar-thumb{background:var(--ink-faint);border-radius:3px}
.msg{display:flex;gap:8px;animation:msgIn .3s ease}@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}.msg-avatar{font-size:20px;flex-shrink:0;width:28px;text-align:center}
.msg-bubble{max-width:75%;padding:8px 12px;border-radius:12px 4px 12px 12px;font-size:13px;line-height:1.6;border:1.5px solid var(--ink-faint);background:var(--paper-dark);color:var(--ink);font-family:var(--font-body)}
.msg.user .msg-bubble{background:rgba(74,140,63,.1);border-color:var(--accent-light);border-radius:4px 12px 12px 12px}
.quick-actions{display:flex;flex-wrap:wrap;gap:6px;padding:6px 12px;border-top:1px dashed var(--ink-faint)}
.quick-btn{padding:4px 10px;border:1.5px dashed var(--ink-faint);border-radius:20px;background:transparent;font-family:var(--font-sketch);font-size:11px;color:var(--ink-light);cursor:pointer}
.quick-btn:hover{border-color:var(--ink);background:var(--paper-dark);color:var(--ink)}
.chat-input-area{display:flex;gap:6px;padding:8px 12px;border-top:2px dashed var(--ink-faint)}
.chat-input-area input{flex:1;padding:8px 12px;border:2px solid var(--ink-faint);border-radius:var(--radius-rough-sm);background:var(--paper-dark);font-family:var(--font-body);font-size:13px;color:var(--ink);outline:none}
.btn-send{padding:8px 14px;background:var(--ink);color:var(--paper);border:none;border-radius:var(--radius-rough-sm);font-family:var(--font-sketch);font-size:13px;cursor:pointer}.btn-send:hover{background:var(--accent)}
.detail-popup{position:fixed;inset:0;z-index:5000;background:rgba(61,50,43,.3);display:none;align-items:center;justify-content:center}
.popup-inner{background:var(--paper);border:3px solid var(--ink);border-radius:var(--radius-rough-lg);box-shadow:6px 6px 0px rgba(61,50,43,.2);padding:24px;text-align:center;max-width:380px;width:90%;position:relative}
.popup-close{position:absolute;top:8px;right:12px;background:none;border:none;font-size:20px;color:var(--ink-faint);cursor:pointer}
.popup-icon{font-size:48px;margin-bottom:8px}.popup-inner h3{font-family:var(--font-sketch);font-size:20px;font-weight:400;margin-bottom:6px}
.popup-desc{font-size:13px;color:var(--ink-light);margin-bottom:16px;line-height:1.5}
.popup-actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.sketch-marker-wrap{display:flex;flex-direction:column;align-items:center}
.sketch-marker-wrap .marker-dot{width:14px;height:14px;background:var(--accent);border:2px solid var(--ink);border-radius:50%;box-shadow:2px 2px 0px rgba(61,50,43,.3)}
.sketch-marker-wrap .marker-label{font-family:var(--font-sketch);font-size:11px;color:var(--ink);background:var(--paper);padding:2px 8px;border:1.5px solid var(--ink);border-radius:var(--radius-rough-sm);white-space:nowrap;margin-top:2px;box-shadow:var(--shadow-rough-sm)}
.user-marker-wrap{display:flex;flex-direction:column;align-items:center}
.user-marker-wrap .user-dot-outer{width:24px;height:24px;background:rgba(74,124,150,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;animation:pulse 2s infinite}
.user-marker-wrap .user-dot-inner{width:12px;height:12px;background:var(--blue);border:2px solid white;border-radius:50%;box-shadow:0 0 8px rgba(74,124,150,.5)}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.5}}
@media(max-width:768px){.side-panel{width:260px;left:6px;max-height:55vh}.agent-panel{width:calc(100vw - 24px);right:12px;bottom:8px;max-height:380px}.top-bar{padding:6px 12px;gap:8px}.brand h1{font-size:15px}.brand-tag{display:none}.nav-info-bar{bottom:70px;padding:8px 12px;gap:8px}.nav-route-info{font-size:12px}}
@media(max-width:480px){.side-panel{width:240px;left:4px}.chat-messages{max-height:180px}.agent-panel{max-height:340px}.quick-actions{display:none}.nav-info-bar{bottom:80px}}
</style>
</head>
<body>
<div id="map"></div>
<div class="coord-display" id="coordDisplay">移动鼠标查看坐标 | 右键采集</div>

<header class="top-bar">
  <div class="brand"><span class="brand-icon">🦁</span><h1 id="titleCn">红山动物园</h1><span class="brand-tag">手绘导航</span></div>
  <div class="header-actions">
    <button class="btn-sketch" id="btnPickStart"><span class="icon">📌</span> <span class="lbl" data-cn="选起点" data-en="Start">选起点</span></button>
    <button class="btn-sketch" id="btnCollect"><span class="icon">📍</span> <span class="lbl" data-cn="采点" data-en="Collect">采点</span></button>
    <button class="btn-sketch" id="btnDemo" style="border-style:dashed;"><span class="icon">🎓</span> <span class="lbl" data-cn="模拟" data-en="Demo">模拟</span></button>
    <button class="btn-sketch" id="btnGps"><span class="icon">📍</span> <span class="lbl" data-cn="定位" data-en="GPS">定位</span></button>
    <button class="btn-sketch" id="btnTogglePanel"><span class="icon">📋</span> <span class="lbl" data-cn="展区" data-en="Exhibits">展区</span></button>
    <button class="btn-sketch" id="btnLang"><span class="icon">🌐</span> EN</button>
  </div>
</header>

<div class="side-panel" id="sidePanel">
  <div class="panel-header">
    <h3 id="panelTitle">🐾 动物园展区</h3>
    <div class="search-box"><input type="text" id="searchInput" placeholder="搜索展区…" autocomplete="off"><span class="search-icon">🔍</span></div>
    <div class="category-filters">
      <button class="cat-chip active" data-cat="all">全部</button>
      <button class="cat-chip" data-cat="mammal">🐘 哺乳</button>
      <button class="cat-chip" data-cat="bird">🐦 鸟类</button>
      <button class="cat-chip" data-cat="reptile">🦎 爬行</button>
      <button class="cat-chip" data-cat="primate">🐒 灵长</button>
      <button class="cat-chip" data-cat="service">🏪 服务</button>
    </div>
  </div>
  <div class="location-list" id="locationList"></div>
</div>

<div class="nav-info-bar" id="navInfoBar">
  <div class="nav-route-info"><span id="navFrom">📍</span><span class="nav-arrow">→</span><span id="navTo">🏁</span><span class="nav-distance" id="navDistance"></span><span class="nav-time" id="navTime"></span></div>
  <button class="btn-sketch btn-sm" id="btnCancelNav">✕</button>
</div>

<div class="agent-panel" id="agentPanel">
  <div class="agent-header" id="agentToggle"><span class="agent-avatar">🦁</span><span class="agent-title" id="agentTitle">动物园助手</span><span class="agent-toggle-icon" id="agentToggleIcon">−</span></div>
  <div class="agent-body" id="agentBody">
    <div class="chat-messages" id="chatMessages"><div class="msg bot"><div class="msg-avatar">🦁</div><div class="msg-bubble" id="welcomeMsg">你好！红山动物园助手 🦁<br>📌 选起点 → 点地图 | 🎓 模拟 | 📍 GPS<br>试试："带我去大熊猫"<br>Try: "Take me to Panda"</div></div></div>
    <div class="quick-actions">
      <button class="quick-btn" id="btnCalibrate" style="border-color:var(--accent);color:var(--accent);">🎯 校准</button>
      <button class="quick-btn" data-cmd="带我去大熊猫">🐼 大熊猫</button>
      <button class="quick-btn" data-cmd="带我去考拉">🐨 考拉</button>
      <button class="quick-btn" data-cmd="附近有什么">📍 附近</button>
    </div>
    <div class="chat-input-area"><input type="text" id="chatInput" placeholder="如：带我去大熊猫 / Take me to Panda" autocomplete="off"><button class="btn-send" id="btnSend">发送</button></div>
  </div>
</div>

<div class="detail-popup" id="detailPopup">
  <div class="popup-inner"><button class="popup-close" id="popupClose">✕</button><div class="popup-icon" id="popupIcon"></div><h3 id="popupName"></h3><p class="popup-desc" id="popupDesc"></p><div class="popup-actions"><button class="btn-sketch btn-go" id="popupGo">🧭 导航到这里</button></div></div>
</div>

  acm('bot',LANG==='cn'?'已切换为中文':'Switched to English');
});

// ── 事件 ──────────────────────────────────────
document.getElementById('btnTogglePanel').addEventListener('click',function(){document.getElementById('sidePanel').classList.toggle('collapsed')});
document.getElementById('btnCancelNav').addEventListener('click',function(){cr();acm('bot',L('cancelOk'))});
document.getElementById('btnSend').addEventListener('click',function(){var i=document.getElementById('chatInput');paq(i.value);i.value=''});
document.getElementById('chatInput').addEventListener('keydown',function(e){if(e.key==='Enter'){var i=document.getElementById('chatInput');paq(i.value);i.value=''}});
document.getElementById('agentToggle').addEventListener('click',function(){var p=document.getElementById('agentPanel');p.classList.toggle('collapsed');document.getElementById('agentToggleIcon').textContent=p.classList.contains('collapsed')?'+':'−'});
document.getElementById('popupClose').addEventListener('click',cdp);
document.getElementById('detailPopup').addEventListener('click',function(e){if(e.target===e.currentTarget)cdp()});
document.getElementById('searchInput').addEventListener('input',function(e){rl(S.acat,e.target.value)});
var chips=document.querySelectorAll('.cat-chip');for(var i=0;i<chips.length;i++){chips[i].addEventListener('click',function(){for(var j=0;j<chips.length;j++)chips[j].classList.remove('active');this.classList.add('active');S.acat=this.dataset.cat;document.getElementById('searchInput').value='';rl(S.acat);LOCS.forEach(function(loc){var m=S.mks[loc.id];if(m){S.acat==='all'||loc.cat===S.acat?m.show():m.hide()}})})}
var qbs=document.querySelectorAll('.quick-btn[data-cmd]');for(var k=0;k<qbs.length;k++){qbs[k].addEventListener('click',function(){paq(this.dataset.cmd)})}
document.addEventListener('keydown',function(e){if(e.key==='Escape'){cdp();cr()}});

rl();
</script>
